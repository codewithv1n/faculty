<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <title>Faculty Management System</title>
</head>
<body>
  
<div class="sidebar">
 
</div>



<section id="profile-status">
  <div class="container1">
    <h2>Add New Position</h2>
    <div class="form-group">
      <label for="position">Position Title</label>
      <input type="text" id="position" required>
    </div>
    <div class="form-group">
      <label for="salaryGrade">Salary Grade</label>
      <input type="number" id="salaryGrade" required>
    </div>
    <div class="form-group">
      <label for="monthlySalary">Monthly Salary</label>
      <input type="number" id="monthlySalary" required>
    </div>
    <div class="form-group">
      <label for="effectiveDate">Effective Date</label>
      <input type="date" id="effectiveDate" required>
    </div>
    <button onclick="addPosition()">Add Position</button>
  </div>

  
  <div class="container2">
    <h2>Position List</h2>
    <table id="positionTable">
      <thead>
        <tr>
          <th>Position</th>
          <th>Salary Grade</th>
          <th>Monthly Salary</th>
          <th>Employment Type</th>
          <th>Effective Date</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="positionBody">
       
      </tbody>
    </table>
 </div>

</section>
</body>
</html>
